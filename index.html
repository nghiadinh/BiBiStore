<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiệm nhà BiBi - Dessert Menu</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #FFB84D;
            margin: 0;
            overflow-x: hidden;
        }

        .sun-bg {
            position: absolute;
            background: #FFD166;
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.6;
        }

        .wavy-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 100px;
            fill: white;
            opacity: 0.4;
            pointer-events: none;
            animation: wave 15s linear infinite;
        }

        @keyframes wave {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        .menu-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .menu-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .image-container {
            width: 220px;
            height: 220px;
            border: 8px solid white;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.2);
            position: relative;
            background-color: #fef3c7;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #FFB84D;
        }

        ::-webkit-scrollbar-thumb {
            background: #d97706;
            border-radius: 10px;
        }
    </style>
</head>

<body class="min-h-screen relative pb-32">

    <div class="sun-bg w-[400px] h-[400px] -top-20 -left-20"></div>
    <div class="sun-bg w-[300px] h-[300px] top-1/2 -right-20"></div>

    <div class="max-w-6xl mx-auto px-6 py-12">
        <header class="text-center mb-20">
            <p class="text-amber-900 font-bold tracking-[0.2em] uppercase text-sm mb-4">Tiệm nhà BiBi</p>
            <div class="relative inline-block">
                <h1 class="text-7xl md:text-8xl font-black text-amber-950 italic leading-none drop-shadow-md">
                    DESSERT
                </h1>
                <div class="flex items-center justify-center gap-4 mt-2">
                    <span class="text-white text-3xl">✦</span>
                    <span class="text-4xl md:text-5xl font-bold text-amber-900">Menu</span>
                    <span class="text-white text-3xl">✦</span>
                </div>
            </div>
        </header>

        <div id="menu-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-y-16 gap-x-8"></div>

        <footer
            class="mt-24 bg-white/90 backdrop-blur-md rounded-[3rem] p-8 md:p-10 shadow-2xl border-4 border-white/50 relative z-10">
            <div class="grid grid-cols-2 md:grid-cols-5 gap-8 text-center text-amber-950 font-bold">
                <div class="flex flex-col items-center gap-2">
                    <div class="bg-orange-100 p-3 rounded-full mb-1">⏰</div>
                    <p class="text-lg">Giờ mở cửa: 6:30 AM - 10:30 PM</p>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <a href="tel:0972861412"
                        class="bg-orange-100 p-3 rounded-full mb-1 hover:opacity-75 transition-opacity">📱</a>
                    <a href="tel:0972861412" class="text-lg hover:text-orange-600 transition-colors">0972.86.14.12</a>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <a href="https://zalo.me/0972861412" target="_blank"
                        class="p-1 mb-1 hover:opacity-75 transition-opacity">
                        <img src="zalo.svg" width="40" height="40" alt="Zalo" />
                    </a>
                    <a href="https://zalo.me/0972861412" target="_blank"
                        class="text-lg hover:text-blue-600 transition-colors">Zalo</a>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <a href="https://www.facebook.com/profile.php?id=61585916650909" target="_blank"
                        class="p-1 mb-1 hover:opacity-75 transition-opacity">
                        <img src="facebook.svg" width="40" height="40" alt="Facebook" />
                    </a>
                    <a href="https://www.facebook.com/profile.php?id=61585916650909" target="_blank"
                        class="text-lg hover:text-blue-700 transition-colors">Facebook</a>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <a href="https://maps.app.goo.gl/8Q2x3rdomrKwZPGL9" target="_blank"
                        class="bg-orange-100 p-3 rounded-full mb-1 hover:opacity-75 transition-opacity">📍</a>
                    <a href="https://maps.app.goo.gl/8Q2x3rdomrKwZPGL9" target="_blank"
                        class="text-lg hover:text-orange-600 transition-colors">BS10 - Vinhomes Grand Park</a>
                </div>
            </div>
        </footer>
    </div>

    <svg class="wavy-footer" viewBox="0 0 1200 120" preserveAspectRatio="none">
        <path
            d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V120H0V95.8C58.47,106.69,122.56,101,183.18,87.72,242,74.79,286,63,321.39,56.44Z">
        </path>
    </svg>

    <script>
        /**
         * EMBEDDING INSTRUCTIONS:
         * To make this file truly self-contained, convert your image files to Base64 strings
         * (using a tool like https://www.base64-image.de/) and paste the resulting strings
         * into the empty quotes below.
         */
        const embeddedImages = {
            "Sữa Chua.jpg": "",
            "Sữa Chua Phô Mai.jpg": "",
            "Bánh Flan.jpg": "",
            "Panacotta.jpg": "",
            "Tàu hủ Singapore.jpg": "",
            "Chè Dưỡng Nhan.jpg": ""
        };

        const menuItems = [
            {
                title: "Sữa chua truyền thống",
                price: "60k/set",
                description: "(10 hủ 80ml hoặc 8 hủ 100ml)",
                fileName: "Sữa Chua.jpg"
            },
            {
                title: "Sữa chua phô mai",
                price: "12k/hủ 100ml",
                description: "(mua từ 5 hủ trở lên giá 11k/hủ)",
                fileName: "Sữa Chua Phô Mai.jpg"
            },
            {
                title: "Flan Caramel",
                price: "65k/set 10 hủ",
                description: "(trứng gà ko phôi - 🌱 ăn chay được)",
                fileName: "Bánh Flan.jpg"
            },
            {
                title: "Panna Cotta",
                price: "50k/set 6 hủ",
                description: "(mix vị trái cây 🥝 🫐 🥭 🍓 🍋 dây)",
                fileName: "Panacotta.jpg"
            },
            {
                title: "Tàu hủ Sing",
                price: "30k/set 4 hủ",
                description: "(tặng kèm sốt béo + trân châu đường đen)",
                fileName: "Tàu hủ Singapore.jpg"
            },
            {
                title: "Chè dưỡng nhan",
                price: "18k/chai 330ml",
                description: "(100% dùng đường phèn)",
                fileName: "Chè Dưỡng Nhan.jpg"
            }
        ];

        function renderMenu() {
            const grid = document.getElementById('menu-grid');

            menuItems.forEach((item) => {
                const card = document.createElement('div');
                card.className = "menu-card flex flex-col items-center text-center p-8 bg-white/50 rounded-[3rem] backdrop-blur-md shadow-xl border border-white/40";

                // Priority: Use embedded Base64 string if it exists, otherwise use filename
                const imgSrc = embeddedImages[item.fileName] || item.fileName;

                card.innerHTML = `
                    <div class="image-container rounded-full overflow-hidden mb-8 flex items-center justify-center">
                        <img 
                            src="${imgSrc}" 
                            class="w-full h-full object-cover" 
                            alt="${item.title}" 
                            onerror="handleImageError(this)"
                        >
                    </div>
                    <h3 class="text-2xl font-black text-amber-950 mb-2 leading-tight">${item.title}</h3>
                    <p class="text-orange-600 font-bold text-xl mb-3">💰 ${item.price}</p>
                    <p class="text-amber-900 leading-relaxed italic text-sm font-medium px-2 opacity-90">${item.description}</p>
                `;

                grid.appendChild(card);
            });
        }

        function handleImageError(img) {
            img.onerror = null;
            img.parentElement.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full text-amber-800 p-4 text-center">
                    <svg class="w-12 h-12 mb-2 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                    <span class="text-[10px] font-bold uppercase tracking-widest opacity-60">Cần nhúng dữ liệu Base64</span>
                </div>
            `;
        }

        window.addEventListener('DOMContentLoaded', renderMenu);
    </script>
</body>

</html>
