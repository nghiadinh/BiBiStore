<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiệm nhà BiBi - Dessert Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #FFB84D;
            margin: 0;
            overflow-x: hidden;
        }

        .sun-bg {
            position: absolute;
            background: #FFD166;
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.6;
        }

        .wavy-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 100px;
            fill: white;
            opacity: 0.4;
            pointer-events: none;
            animation: wave 15s linear infinite;
        }

        @keyframes wave {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .menu-card {
            transition: transform 0.3s ease;
        }

        .menu-card:hover {
            transform: translateY(-8px);
        }

        .image-container {
            width: 180px;
            height: 180px;
            border: 4px solid white;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loader {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #f97316;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body class="min-h-screen relative pb-32">

    <!-- Decorative Background -->
    <div class="sun-bg w-[400px] h-[400px] -top-20 -left-20"></div>
    <div class="sun-bg w-[300px] h-[300px] top-1/2 -right-20"></div>

    <div class="max-w-6xl mx-auto px-6 py-12">
        <!-- Header -->
        <header class="text-center mb-20">
            <p class="text-amber-900 font-bold tracking-[0.2em] uppercase text-sm mb-4">Tiệm nhà BiBi</p>
            <div class="relative inline-block">
                <h1 class="text-7xl md:text-8xl font-black text-amber-950 italic leading-none drop-shadow-md">
                    DESSERT
                </h1>
                <div class="flex items-center justify-center gap-4 mt-2">
                    <span class="text-white text-3xl">✦</span>
                    <span class="text-4xl md:text-5xl font-bold text-amber-900">Menu</span>
                    <span class="text-white text-3xl">✦</span>
                </div>
            </div>
        </header>

        <!-- Menu Grid -->
        <div id="menu-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
            <!-- Items will be injected here by JS -->
        </div>

        <!-- Footer Info -->
        <footer class="mt-24 bg-white/80 backdrop-blur-md rounded-[3rem] p-8 md:p-10 shadow-2xl border-4 border-white/50">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 text-center text-amber-950 font-bold">
                <div class="flex flex-col items-center gap-2">
                    <span class="text-2xl">⏰</span>
                    <p>Open 6:30 AM - 10:30 PM</p>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <span class="text-2xl">📱</span>
                    <a href="tel:0972861412" class="hover:text-orange-600">0972.86.14.12</a>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <span class="text-2xl">📍</span>
                    <p>BS10 - Vinhomes Grand Park</p>
                </div>
            </div>
        </footer>
    </div>

    <!-- Wavy Animation -->
    <svg class="wavy-footer" viewBox="0 0 1200 120" preserveAspectRatio="none">
        <path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V120H0V95.8C58.47,106.69,122.56,101,183.18,87.72,242,74.79,286,63,321.39,56.44Z"></path>
    </svg>

    <script>
        const apiKey = ""; // API Key provided by environment
        
        const menuItems = [
            {
                title: "Sữa chua truyền thống",
                price: "60k/set",
                description: "(10 hủ 80ml hoặc 8 hủ 100ml)",
                prompt: "Professional food photography of traditional Vietnamese white yogurt in small clear plastic containers with lids, bright lighting"
            },
            {
                title: "Sữa chua phô mai",
                price: "12k/hủ 100ml",
                description: "(mua từ 5 hủ trở lên giá 11k/hủ)",
                prompt: "Creamy white cheese yogurt in a small glass jar with a small spoon, close up photography"
            },
            {
                title: "Flan Caramel",
                price: "65k/set 10 hủ",
                description: "(trứng gà ko phôi - ăn chay được)",
                prompt: "Classic caramel custard flan on a small white dessert plate, glossy caramel sauce"
            },
            {
                title: "Panna Cotta",
                price: "50k/set 6 hủ",
                description: "(mix vị trái cây 🥝 🫐 🥭 🍓 🍒)",
                prompt: "Different flavors of fruit panna cotta in small plastic cups, colorful toppings"
            },
            {
                title: "Tàu hủ Sing",
                price: "30k/set 4 hủ",
                description: "(tặng kèm sốt béo + trân châu đường đen)",
                prompt: "Singaporean silk tofu pudding in a bowl with black sugar tapioca pearls"
            },
            {
                title: "Chè dưỡng nhan",
                price: "18k/chai 330ml",
                description: "(100% dùng đường phèn)",
                prompt: "Bottles of colorful chè dưỡng nhan herbal dessert with goji berries and dates"
            }
        ];

        async function generateImage(prompt, elementId) {
            const container = document.getElementById(elementId);
            let retries = 0;
            const maxRetries = 5;

            const callApi = async () => {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{ text: prompt }]
                            }],
                            generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
                        })
                    });

                    if (!response.ok) throw new Error('API Error');

                    const result = await response.json();
                    const base64 = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;

                    if (base64) {
                        container.innerHTML = `<img src="data:image/png;base64,${base64}" class="w-full h-full object-cover" alt="Food item">`;
                    } else {
                        throw new Error('No image');
                    }
                } catch (err) {
                    if (retries < maxRetries) {
                        retries++;
                        const delay = Math.pow(2, retries) * 1000;
                        setTimeout(callApi, delay);
                    } else {
                        container.innerHTML = `<div class="text-xs text-orange-800 text-center px-2 italic">Image unavailable</div>`;
                    }
                }
            };

            callApi();
        }

        function renderMenu() {
            const grid = document.getElementById('menu-grid');
            
            menuItems.forEach((item, index) => {
                const id = `img-${index}`;
                const card = document.createElement('div');
                card.className = "menu-card flex flex-col items-center text-center p-6 bg-white/40 rounded-[2.5rem] backdrop-blur-sm shadow-lg";
                
                card.innerHTML = `
                    <div id="${id}" class="image-container rounded-full overflow-hidden mb-6 bg-orange-100/50 flex items-center justify-center">
                        <div class="loader"></div>
                    </div>
                    <h3 class="text-2xl font-black text-amber-950 mb-2">${item.title}</h3>
                    <p class="text-orange-600 font-bold text-lg mb-2">💰 ${item.price}</p>
                    <p class="text-amber-900 leading-relaxed italic text-sm px-4">${item.description}</p>
                `;
                
                grid.appendChild(card);
                generateImage(item.prompt, id);
            });
        }

        window.onload = renderMenu;
    </script>
</body>
</html>
